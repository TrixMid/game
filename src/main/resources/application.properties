# Application Name
spring.application.name=quizgame
server.port=8087

# Primary Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/quizdb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
# 'update' allows Hibernate to create tables if they are missing
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# FIX: Removed MySQL5Dialect to prevent the ClassNotFoundException
# Hibernate 7 will auto-detect or use the modern version safely
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- Legacy/Secondary Datasource Keys ---
# Keep these if your 'fallback to sqlite' logic specifically looks for 'mysql.datasource' prefix
mysql.datasource.url=jdbc:mysql://localhost:3306/quizdb?useSSL=false&serverTimezone=UTC
mysql.datasource.username=root
mysql.datasource.password=
mysql.datasource.driver-class-name=com.mysql.cj.jdbc.Driver