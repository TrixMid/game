<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fragen verwalten</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
    <style>
        #menu {
            display: none;
        }
    </style>
</head>
<body>
<div id="menu">
    <ul>
        <li><a href="/">Startseite</a></li>
        <li><a href="/themes">Themen verwalten</a></li>
        <li><a href="/teams">Teams verwalten</a></li>
        <li><a href="/questionsets">Fragensätze verwalten</a></li>
        <li><a href="/questions">Fragen verwalten</a></li>
    </ul>
</div>
<h1>Fragen verwalten</h1>
<h2>Vorhandene Fragen</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Fragetext</th>
        <th>Fragensatz</th>
        <th>Typ</th>
        <th>Punkte</th>
        <th>Themen</th>
        <th>Aktionen</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="q : ${questions}">
        <td th:text="${q.id}"></td>
        <td th:text="${q.startText}"></td>
        <td th:text="${q.questionSet.title}"></td>
        <td th:text="${q.questionType}"></td>
        <td th:text="${q.points}"></td>
        <td>
            <ul>
                <li th:each="theme : ${q.themes}" th:text="${theme.name}"></li>
            </ul>
        </td>
        <td>
            <a th:if="${q.questionType.name() == 'MC' or q.questionType.name() == 'TF'}" th:href="@{/questions/{id}/mcanswers(id=${q.id})}">Antworten verwalten</a>
            <a th:if="${q.questionType.name() == 'GAP'}" th:href="@{/questions/{id}/gapfields(id=${q.id})}">Lücken verwalten</a>
        </td>
    </tr>
    </tbody>
</table>

<h2>Neue Frage hinzufügen</h2>
<form action="/questions" method="post" th:object="${question}">
    <div>
        <label for="startText">Fragetext:</label>
        <textarea id="startText" th:field="*{startText}"></textarea>
    </div>
    <div>
        <label for="endText">Text am Ende:</label>
        <textarea id="endText" th:field="*{endText}"></textarea>
    </div>
    <div>
        <label for="imageUrl">Bild-URL:</label>
        <input type="text" id="imageUrl" th:field="*{imageUrl}">
    </div>
    <div>
        <label for="points">Punkte:</label>
        <input type="number" id="points" th:field="*{points}">
    </div>
    <div>
        <label for="allowsMultiple">Mehrere Antworten erlauben:</label>
        <input type="checkbox" id="allowsMultiple" th:field="*{allowsMultiple}">
    </div>
    <div>
        <label for="questionSet">Fragensatz:</label>
        <select id="questionSet" th:field="*{questionSet}">
            <option th:each="qs : ${questionSets}" th:value="${qs.id}" th:text="${qs.title}"></option>
        </select>
    </div>
    <div>
        <label for="questionType">Fragetyp:</label>
        <select id="questionType" th:field="*{questionType}">
            <option th:each="qt : ${questionTypes}" th:value="${qt}" th:text="${qt}"></option>
        </select>
    </div>
    <div>
        <label for="themes">Themen:</label>
        <select id="themes" th:field="*{themes}" multiple>
            <option th:each="theme : ${themes}" th:value="${theme.id}" th:text="${theme.name}"></option>
        </select>
    </div>
    <div>
        <button type="submit">Frage hinzufügen</button>
    </div>
</form>

<script>
    document.addEventListener('keydown', function(event) {
        if (event.ctrlKey && event.key === 'p') {
            if (document.activeElement.tagName.toLowerCase() !== 'input' && document.activeElement.tagName.toLowerCase() !== 'textarea') {
                event.preventDefault();
                var menu = document.getElementById('menu');
                if (menu.style.display === 'none') {
                    menu.style.display = 'block';
                } else {
                    menu.style.display = 'none';
                }
            }
        }
    });
</script>
</body>
</html>
