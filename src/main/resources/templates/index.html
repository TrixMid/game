<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quizspiel-Admin</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
    <style>
        #menu {
            display: none;
        }
        .admin-welcome {
            background-color: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
            margin-top: 50px;
        }
        .admin-welcome p {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 30px;
        }
        .shortcut-hint {
            display: inline-block;
            background: #eee;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
<h1>Quizspiel-Admin</h1>

<div class="admin-welcome">
    <h2>Willkommen im Administrationsbereich!</h2>
    <p>Hier können Sie alle Aspekte des Quizspiels verwalten.</p>
    <p>Drücken Sie <span class="shortcut-hint">Ctrl + P</span>, um das Navigationsmenü anzuzeigen oder auszublenden.</p>
</div>

<div id="menu">
    <ul>
        <li><a href="/themes">Themen verwalten</a></li>
        <li><a href="/teams">Teams verwalten</a></li>
        <li><a href="/questionsets">Fragensätze verwalten</a></li>
        <li><a href="/questions">Fragen verwalten</a></li>
    </ul>
</div>

<script>
    document.addEventListener('keydown', function(event) {
        if (event.ctrlKey && event.key === 'p') {
            if (document.activeElement.tagName.toLowerCase() !== 'input' && document.activeElement.tagName.toLowerCase() !== 'textarea') {
                event.preventDefault();
                var menu = document.getElementById('menu');
                if (menu.style.display === 'none') {
                    menu.style.display = 'block';
                } else {
                    menu.style.display = 'none';
                }
            }
        }
    });
</script>
</body>
</html>
