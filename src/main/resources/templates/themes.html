<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Themen verwalten</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
    <style>
        #menu {
            display: none;
        }
    </style>
</head>
<body>
<div id="menu">
    <ul>
        <li><a href="/">Startseite</a></li>
        <li><a href="/themes">Themen verwalten</a></li>
        <li><a href="/teams">Teams verwalten</a></li>
        <li><a href="/questionsets">Fragensätze verwalten</a></li>
        <li><a href="/questions">Fragen verwalten</a></li>
    </ul>
</div>
<h1>Themen verwalten</h1>
<h2>Vorhandene Themen</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Beschreibung</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="theme : ${themes}">
        <td th:text="${theme.id}"></td>
        <td th:text="${theme.name}"></td>
        <td th:text="${theme.description}"></td>
    </tr>
    </tbody>
</table>

<h2>Neues Thema hinzufügen</h2>
<form action="/themes" method="post" th:object="${theme}">
    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" th:field="*{name}">
    </div>
    <div>
        <label for="description">Beschreibung:</label>
        <input type="text" id="description" th:field="*{description}">
    </div>
    <div>
        <button type="submit">Thema hinzufügen</button>
    </div>
</form>

<script>
    document.addEventListener('keydown', function(event) {
        if (event.ctrlKey && event.key === 'p') {
            if (document.activeElement.tagName.toLowerCase() !== 'input' && document.activeElement.tagName.toLowerCase() !== 'textarea') {
                event.preventDefault();
                var menu = document.getElementById('menu');
                if (menu.style.display === 'none') {
                    menu.style.display = 'block';
                } else {
                    menu.style.display = 'none';
                }
            }
        }
    });
</script>
</body>
</html>
