<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lückenfelder verwalten</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
    <style>
        #menu {
            display: none;
        }
    </style>
</head>
<body>
<div id="menu">
    <ul>
        <li><a href="/">Startseite</a></li>
        <li><a href="/themes">Themen verwalten</a></li>
        <li><a href="/teams">Teams verwalten</a></li>
        <li><a href="/questionsets">Fragensätze verwalten</a></li>
        <li><a href="/questions">Fragen verwalten</a></li>
    </ul>
</div>
<h1 th:text="'Lückenfelder verwalten für Frage: ' + ${question.startText}"></h1>
<h2>Vorhandene Lückenfelder</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Index</th>
        <th>Text davor</th>
        <th>Text danach</th>
        <th>Aktionen</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="gap : ${gapFields}">
        <td th:text="${gap.id}"></td>
        <td th:text="${gap.gapIndex}"></td>
        <td th:text="${gap.textBefore}"></td>
        <td th:text="${gap.textAfter}"></td>
        <td>
            <a th:href="@{/questions/{qId}/gapfields/{gfId}/gapoptions(qId=${question.id}, gfId=${gap.id})}">Optionen verwalten</a>
        </td>
    </tr>
    </tbody>
</table>

<h2>Neues Lückenfeld hinzufügen</h2>
<form th:action="@{/questions/{id}/gapfields(id=${question.id})}" method="post" th:object="${gapField}">
    <div>
        <label for="gapIndex">Index:</label>
        <input type="number" id="gapIndex" th:field="*{gapIndex}">
    </div>
    <div>
        <label for="textBefore">Text davor:</label>
        <input type="text" id="textBefore" th:field="*{textBefore}">
    </div>
    <div>
        <label for="textAfter">Text danach:</label>
        <input type="text" id="textAfter" th:field="*{textAfter}">
    </div>
    <div>
        <button type="submit">Lückenfeld hinzufügen</button>
    </div>
</form>

<script>
    document.addEventListener('keydown', function(event) {
        if (event.ctrlKey && event.key === 'p') {
            if (document.activeElement.tagName.toLowerCase() !== 'input' && document.activeElement.tagName.toLowerCase() !== 'textarea') {
                event.preventDefault();
                var menu = document.getElementById('menu');
                if (menu.style.display === 'none') {
                    menu.style.display = 'block';
                } else {
                    menu.style.display = 'none';
                }
            }
        }
    });
</script>
</body>
</html>
