<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fragensätze verwalten</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
    <style>
        #menu {
            display: none;
        }
    </style>
</head>
<body>
<div id="menu">
    <ul>
        <li><a href="/">Startseite</a></li>
        <li><a href="/themes">Themen verwalten</a></li>
        <li><a href="/teams">Teams verwalten</a></li>
        <li><a href="/questionsets">Fragensätze verwalten</a></li>
        <li><a href="/questions">Fragen verwalten</a></li>
    </ul>
</div>
<h1>Fragensätze verwalten</h1>
<h2>Vorhandene Fragensätze</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Titel</th>
        <th>Teamname</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="qs : ${questionSets}">
        <td th:text="${qs.id}"></td>
        <td th:text="${qs.title}"></td>
        <td th:text="${qs.team.name}"></td>
    </tr>
    </tbody>
</table>

<h2>Neuen Fragensatz hinzufügen</h2>
<form action="/questionsets" method="post" th:object="${questionSet}">
    <div>
        <label for="title">Titel:</label>
        <input type="text" id="title" th:field="*{title}">
    </div>
    <div>
        <label for="team">Teamname:</label>
        <select id="team" th:field="*{team}">
            <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"></option>
        </select>
    </div>
    <div>
        <button type="submit">Fragensatz hinzufügen</button>
    </div>
</form>

<script>
    document.addEventListener('keydown', function(event) {
        if (event.ctrlKey && event.key === 'p') {
            if (document.activeElement.tagName.toLowerCase() !== 'input' && document.activeElement.tagName.toLowerCase() !== 'textarea') {
                event.preventDefault();
                var menu = document.getElementById('menu');
                if (menu.style.display === 'none') {
                    menu.style.display = 'block';
                } else {
                    menu.style.display = 'none';
                }
            }
        }
    });
</script>
</body>
</html>
