<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lückenoptionen verwalten</title>
    <link rel="stylesheet" th:href="@{/admin.css}">
    <style>
        #menu {
            display: none;
        }
    </style>
</head>
<body>
<div id="menu">
    <ul>
        <li><a href="/">Startseite</a></li>
        <li><a href="/themes">Themen verwalten</a></li>
        <li><a href="/teams">Teams verwalten</a></li>
        <li><a href="/questionsets">Fragensätze verwalten</a></li>
        <li><a href="/questions">Fragen verwalten</a></li>
    </ul>
</div>
<h1 th:text="'Lückenoptionen verwalten für Lückenfeld: ' + ${gapField.id}"></h1>
<h2>Vorhandene Lückenoptionen</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Optionstext</th>
        <th>Ist richtig</th>
        <th>Reihenfolge</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="opt : ${gapOptions}">
        <td th:text="${opt.id}"></td>
        <td th:text="${opt.optionText}"></td>
        <td th:text="${opt.isCorrect}"></td>
        <td th:text="${opt.optionOrder}"></td>
    </tr>
    </tbody>
</table>

<h2>Neue Lückenoption hinzufügen</h2>
<form th:action="@{/questions/{qId}/gapfields/{gfId}/gapoptions(qId=${questionId}, gfId=${gapField.id})}" method="post" th:object="${gapOption}">
    <div>
        <label for="optionText">Optionstext:</label>
        <input type="text" id="optionText" th:field="*{optionText}">
    </div>
    <div>
        <label for="isCorrect">Ist richtig:</label>
        <input type="checkbox" id="isCorrect" th:field="*{isCorrect}">
    </div>
    <div>
        <label for="optionOrder">Reihenfolge:</label>
        <input type="number" id="optionOrder" th:field="*{optionOrder}">
    </div>
    <div>
        <button type="submit">Lückenoption hinzufügen</button>
    </div>
</form>

<script>
    document.addEventListener('keydown', function(event) {
        if (event.ctrlKey && event.key === 'p') {
            if (document.activeElement.tagName.toLowerCase() !== 'input' && document.activeElement.tagName.toLowerCase() !== 'textarea') {
                event.preventDefault();
                var menu = document.getElementById('menu');
                if (menu.style.display === 'none') {
                    menu.style.display = 'block';
                } else {
                    menu.style.display = 'none';
                }
            }
        }
    });
</script>
</body>
</html>
