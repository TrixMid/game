<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Gap Options</title>
    <style>
        #menu {
            display: none;
        }
    </style>
</head>
<body>
<div id="menu">
    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/themes">Manage Themes</a></li>
        <li><a href="/teams">Manage Teams</a></li>
        <li><a href="/questionsets">Manage Question Sets</a></li>
        <li><a href="/questions">Manage Questions</a></li>
    </ul>
</div>
<h1 th:text="'Manage Gap Options for Gap Field: ' + ${gapField.id}"></h1>
<h2>Existing Gap Options</h2>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Option Text</th>
        <th>Is Correct</th>
        <th>Order</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="opt : ${gapOptions}">
        <td th:text="${opt.id}"></td>
        <td th:text="${opt.optionText}"></td>
        <td th:text="${opt.isCorrect}"></td>
        <td th:text="${opt.optionOrder}"></td>
    </tr>
    </tbody>
</table>

<h2>Add New Gap Option</h2>
<form th:action="@{/questions/{qId}/gapfields/{gfId}/gapoptions(qId=${questionId}, gfId=${gapField.id})}" method="post" th:object="${gapOption}">
    <div>
        <label for="optionText">Option Text:</label>
        <input type="text" id="optionText" th:field="*{optionText}">
    </div>
    <div>
        <label for="isCorrect">Is Correct:</label>
        <input type="checkbox" id="isCorrect" th:field="*{isCorrect}">
    </div>
    <div>
        <label for="optionOrder">Order:</label>
        <input type="number" id="optionOrder" th:field="*{optionOrder}">
    </div>
    <div>
        <button type="submit">Add Gap Option</button>
    </div>
</form>

<script>
    document.addEventListener('keydown', function(event) {
        if (event.ctrlKey && event.key === 'p') {
            if (document.activeElement.tagName.toLowerCase() !== 'input' && document.activeElement.tagName.toLowerCase() !== 'textarea') {
                event.preventDefault();
                var menu = document.getElementById('menu');
                if (menu.style.display === 'none') {
                    menu.style.display = 'block';
                } else {
                    menu.style.display = 'none';
                }
            }
        }
    });
</script>
</body>
</html>
